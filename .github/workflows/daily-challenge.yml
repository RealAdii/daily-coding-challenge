name: Daily Coding Challenge

on:
  schedule:
    # Runs every day at 9:07 AM UTC
    - cron: '7 9 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch today's problem
        id: fetch
        run: python fetch_problem.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Add Project Euler Problem #${{ steps.fetch.outputs.problem_number }}

          Daily coding challenge - $(date -u +'%Y-%m-%d')
          https://projecteuler.net/problem=${{ steps.fetch.outputs.problem_number }}"
          git push
